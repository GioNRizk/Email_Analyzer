<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Threat Analyzer — Atria Solutions</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #0d1117;
        color: #e6edf3;
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        background: #161b22;
        border-bottom: 1px solid #30363d;
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 {
        font-size: 20px;
        font-weight: 600;
        color: #58a6ff;
      }
      header span {
        font-size: 13px;
        color: #8b949e;
      }

      /* ── Main Layout ── */
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px 32px;
      }

      /* ── Stats Cards ── */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }

      .stat-card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
      }
      .stat-card .number {
        font-size: 36px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .stat-card .label {
        font-size: 13px;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .stat-card.total .number {
        color: #58a6ff;
      }
      .stat-card.phishing .number {
        color: #f85149;
      }
      .stat-card.spam .number {
        color: #e3b341;
      }
      .stat-card.benign .number {
        color: #3fb950;
      }

      /* ── Risk Level Cards ── */
      .risk-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }
      .risk-card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 16px;
        text-align: center;
        border-left: 4px solid;
      }
      .risk-card.critical {
        border-left-color: #f85149;
      }
      .risk-card.high {
        border-left-color: #e3b341;
      }
      .risk-card.medium {
        border-left-color: #d29922;
      }
      .risk-card.low {
        border-left-color: #3fb950;
      }
      .risk-card .number {
        font-size: 28px;
        font-weight: 700;
      }
      .risk-card.critical .number {
        color: #f85149;
      }
      .risk-card.high .number {
        color: #e3b341;
      }
      .risk-card.medium .number {
        color: #d29922;
      }
      .risk-card.low .number {
        color: #3fb950;
      }
      .risk-card .label {
        font-size: 12px;
        color: #8b949e;
        margin-top: 4px;
      }

      /* ── Filter Bar ── */
      .filter-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        flex-wrap: wrap;
        align-items: center;
      }
      .filter-bar span {
        font-size: 13px;
        color: #8b949e;
        margin-right: 4px;
      }
      .filter-btn {
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid #30363d;
        background: #161b22;
        color: #e6edf3;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
      }
      .filter-btn:hover,
      .filter-btn.active {
        background: #58a6ff;
        border-color: #58a6ff;
        color: #0d1117;
      }

      /* ── Table ── */
      .table-container {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead {
        background: #21262d;
      }
      th {
        padding: 12px 16px;
        text-align: left;
        font-weight: 600;
        color: #8b949e;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
        border-bottom: 1px solid #30363d;
      }
      td {
        padding: 12px 16px;
        border-bottom: 1px solid #21262d;
        vertical-align: middle;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: #1c2128;
        cursor: pointer;
      }

      /* ── Badges ── */
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .badge-critical {
        background: rgba(248, 81, 73, 0.2);
        color: #f85149;
      }
      .badge-high {
        background: rgba(227, 179, 65, 0.2);
        color: #e3b341;
      }
      .badge-medium {
        background: rgba(210, 153, 34, 0.2);
        color: #d29922;
      }
      .badge-low {
        background: rgba(63, 185, 80, 0.2);
        color: #3fb950;
      }
      .badge-phishing {
        background: rgba(248, 81, 73, 0.2);
        color: #f85149;
      }
      .badge-bec {
        background: rgba(227, 179, 65, 0.2);
        color: #e3b341;
      }
      .badge-spam {
        background: rgba(210, 153, 34, 0.2);
        color: #d29922;
      }
      .badge-benign {
        background: rgba(63, 185, 80, 0.2);
        color: #3fb950;
      }
      .badge-unknown {
        background: rgba(139, 148, 158, 0.2);
        color: #8b949e;
      }

      /* ── Score Bar ── */
      .score-bar {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .score-bar .bar {
        flex: 1;
        height: 6px;
        background: #21262d;
        border-radius: 3px;
        overflow: hidden;
      }
      .score-bar .fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.3s;
      }
      .score-bar .value {
        font-size: 12px;
        font-weight: 600;
        min-width: 30px;
        text-align: right;
      }

      /* ── Modal ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 12px;
        width: 700px;
        max-width: 95vw;
        max-height: 85vh;
        overflow-y: auto;
        padding: 24px;
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 20px;
      }
      .modal-header h2 {
        font-size: 16px;
        color: #e6edf3;
      }
      .modal-close {
        background: none;
        border: none;
        color: #8b949e;
        font-size: 20px;
        cursor: pointer;
        padding: 0 4px;
      }
      .modal-close:hover {
        color: #e6edf3;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
      }
      .detail-section {
        background: #21262d;
        border-radius: 8px;
        padding: 16px;
      }
      .detail-section h3 {
        font-size: 12px;
        color: #58a6ff;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
      }
      .detail-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 0;
        font-size: 13px;
        border-bottom: 1px solid #30363d;
      }
      .detail-row:last-child {
        border-bottom: none;
      }
      .detail-row .key {
        color: #8b949e;
      }
      .detail-row .val {
        color: #e6edf3;
        font-weight: 500;
        text-align: right;
        max-width: 60%;
        word-break: break-all;
      }

      .reasons-box {
        background: #21262d;
        border-radius: 8px;
        padding: 16px;
        margin-top: 16px;
      }
      .reasons-box h3 {
        font-size: 12px;
        color: #58a6ff;
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .reason-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
        font-size: 13px;
        color: #e6edf3;
      }
      .reason-item::before {
        content: "⚠";
        color: #e3b341;
        font-size: 11px;
      }

      /* ── Loading ── */
      .loading {
        text-align: center;
        padding: 40px;
        color: #8b949e;
      }

      /* ── Empty ── */
      .empty {
        text-align: center;
        padding: 40px;
        color: #8b949e;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
   <header>
    <div style="display:flex;align-items:center;gap:12px">
        <img src="/static/images/atrialogo.png" alt="Atria Solutions" 
             style="height:40px;object-fit:contain">
        <h1>🛡️ Email Threat Analyzer</h1>
    </div>
    <span id="last-updated">Atria Solutions — SOC Dashboard</span>
</header>

    <div class="container">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card total">
          <div class="number" id="stat-total">—</div>
          <div class="label">Total Emails</div>
        </div>
        <div class="stat-card phishing">
          <div class="number" id="stat-phishing">—</div>
          <div class="label">Phishing / BEC</div>
        </div>
        <div class="stat-card spam">
          <div class="number" id="stat-spam">—</div>
          <div class="label">Spam</div>
        </div>
        <div class="stat-card benign">
          <div class="number" id="stat-benign">—</div>
          <div class="label">Benign</div>
        </div>
      </div>

      <!-- Risk Levels -->
      <div class="risk-grid">
        <div class="risk-card critical">
          <div class="number" id="risk-critical">—</div>
          <div class="label">Critical</div>
        </div>
        <div class="risk-card high">
          <div class="number" id="risk-high">—</div>
          <div class="label">High</div>
        </div>
        <div class="risk-card medium">
          <div class="number" id="risk-medium">—</div>
          <div class="label">Medium</div>
        </div>
        <div class="risk-card low">
          <div class="number" id="risk-low">—</div>
          <div class="label">Low</div>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <span>Filter:</span>
        <button class="filter-btn active" onclick="filterEmails('all', this)">
          All
        </button>
        <button class="filter-btn" onclick="filterEmails('phishing', this)">
          🚨 Phishing
        </button>
        <button class="filter-btn" onclick="filterEmails('bec', this)">
          ⚠️ BEC
        </button>
        <button class="filter-btn" onclick="filterEmails('spam', this)">
          📢 Spam
        </button>
        <button class="filter-btn" onclick="filterEmails('benign', this)">
          ✅ Benign
        </button>
        <button class="filter-btn" onclick="filterEmails('CRITICAL', this)">
          🔴 Critical
        </button>
        <button class="filter-btn" onclick="filterEmails('HIGH', this)">
          🟠 High
        </button>
      </div>

      <!-- Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>File</th>
              <th>From</th>
              <th>Subject</th>
              <th>SPF/DKIM/DMARC</th>
              <th>Verdict</th>
              <th>Risk Level</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody id="email-table">
            <tr>
              <td colspan="7" class="loading">Loading emails...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modal-title">Email Details</h2>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div id="modal-content"></div>
      </div>
    </div>

    <script>
      let allEmails = [];
      let currentFilter = "all";

      // ── Load stats ────────────────────────────────────────────
      async function loadStats() {
        const res = await fetch("/api/stats");
        const data = await res.json();

        document.getElementById("stat-total").textContent = data.total || 0;
        document.getElementById("stat-phishing").textContent =
          parseInt(data.phishing || 0) + parseInt(data.bec || 0);
        document.getElementById("stat-spam").textContent = data.spam || 0;
        document.getElementById("stat-benign").textContent = data.benign || 0;
        document.getElementById("risk-critical").textContent =
          data.critical || 0;
        document.getElementById("risk-high").textContent = data.high || 0;
        document.getElementById("risk-medium").textContent = data.medium || 0;
        document.getElementById("risk-low").textContent = data.low || 0;
      }

      // ── Load emails ───────────────────────────────────────────
      async function loadEmails() {
        const res = await fetch("/api/emails");
        allEmails = await res.json();
        renderTable(allEmails);
      }

      // ── Render table ──────────────────────────────────────────
      function renderTable(emails) {
        const tbody = document.getElementById("email-table");

        if (!emails.length) {
          tbody.innerHTML =
            '<tr><td colspan="7" class="empty">No emails found</td></tr>';
          return;
        }

        tbody.innerHTML = emails
          .map((email) => {
            const verdict = email.final_verdict || "unknown";
            const level = email.final_level || "unknown";
            const score = email.final_score || 0;
            const spf = email.spf || "none";
            const dkim = email.dkim || "none";
            const dmarc = email.dmarc || "none";

            const scoreColor =
              score >= 75
                ? "#f85149"
                : score >= 55
                  ? "#e3b341"
                  : score >= 30
                    ? "#d29922"
                    : "#3fb950";

            const authBadge = (val) => {
              const color =
                val === "pass"
                  ? "#3fb950"
                  : val === "fail"
                    ? "#f85149"
                    : "#8b949e";
              return `<span style="color:${color};font-weight:600">${val}</span>`;
            };

            return `
                <tr onclick="showDetail(${email.id})">
                    <td style="font-family:monospace;color:#8b949e">${email.filename}</td>
                    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                        ${email.from_address || "—"}
                    </td>
                    <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#8b949e">
                        ${email.subject || "—"}
                    </td>
                    <td>${authBadge(spf)} / ${authBadge(dkim)} / ${authBadge(dmarc)}</td>
                    <td><span class="badge badge-${verdict}">${verdict}</span></td>
                    <td><span class="badge badge-${level.toLowerCase()}">${level}</span></td>
                    <td>
                        <div class="score-bar">
                            <div class="bar">
                                <div class="fill" style="width:${score}%;background:${scoreColor}"></div>
                            </div>
                            <div class="value" style="color:${scoreColor}">${score}</div>
                        </div>
                    </td>
                </tr>
            `;
          })
          .join("");
      }

      // ── Filter emails ─────────────────────────────────────────
      function filterEmails(filter, btn) {
        currentFilter = filter;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");

        if (filter === "all") {
          renderTable(allEmails);
        } else {
          const filtered = allEmails.filter(
            (e) => e.final_verdict === filter || e.final_level === filter,
          );
          renderTable(filtered);
        }
      }

      // ── Show email detail modal ───────────────────────────────
      async function showDetail(id) {
        const res = await fetch(`/api/email/${id}`);
        const email = await res.json();

        document.getElementById("modal-title").textContent = email.filename;

        let reasons = [];
        try {
          reasons = JSON.parse(email.rule_reasons || "[]");
        } catch (e) {}

        const verdict = email.final_verdict || "unknown";
        const level = email.final_level || "unknown";

        document.getElementById("modal-content").innerHTML = `
            <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
                <span class="badge badge-${verdict}" style="font-size:14px;padding:6px 16px">${verdict.toUpperCase()}</span>
                <span class="badge badge-${level.toLowerCase()}" style="font-size:14px;padding:6px 16px">${level}</span>
                <span style="font-size:14px;font-weight:700;color:${
                  (email.final_score || 0) >= 75
                    ? "#f85149"
                    : (email.final_score || 0) >= 55
                      ? "#e3b341"
                      : (email.final_score || 0) >= 30
                        ? "#d29922"
                        : "#3fb950"
                }">Score: ${email.final_score || 0}/100</span>
            </div>

            <div class="detail-grid">
                <div class="detail-section">
                    <h3>Email Info</h3>
                    <div class="detail-row"><span class="key">From</span><span class="val">${email.from_address || "—"}</span></div>
                    <div class="detail-row"><span class="key">Subject</span><span class="val">${email.subject || "—"}</span></div>
                    <div class="detail-row"><span class="key">Date</span><span class="val">${email.date_received || "—"}</span></div>
                    <div class="detail-row"><span class="key">Domain</span><span class="val">${email.sender_domain || "—"}</span></div>
                </div>
                <div class="detail-section">
                    <h3>Authentication</h3>
                    <div class="detail-row"><span class="key">SPF</span><span class="val" style="color:${email.spf === "pass" ? "#3fb950" : "#f85149"}">${email.spf || "none"}</span></div>
                    <div class="detail-row"><span class="key">DKIM</span><span class="val" style="color:${email.dkim === "pass" ? "#3fb950" : "#f85149"}">${email.dkim || "none"}</span></div>
                    <div class="detail-row"><span class="key">DMARC</span><span class="val" style="color:${email.dmarc === "pass" ? "#3fb950" : "#f85149"}">${email.dmarc || "none"}</span></div>
                    <div class="detail-row"><span class="key">SSL</span><span class="val">${email.ssl_info || "unknown"}</span></div>
                </div>
                <div class="detail-section">
                    <h3>IP Reputation</h3>
                    <div class="detail-row"><span class="key">IP</span><span class="val">${email.sender_ip || "—"}</span></div>
                    <div class="detail-row"><span class="key">AbuseIPDB</span><span class="val">${email.abuse_score ?? "—"}/100</span></div>
                    <div class="detail-row"><span class="key">OTX Pulses</span><span class="val">${email.otx_pulses ?? "—"}</span></div>
                    <div class="detail-row"><span class="key">GreyNoise</span><span class="val">${email.greynoise_classification || "—"}</span></div>
                    <div class="detail-row"><span class="key">DNSBL</span><span class="val">${email.dnsbl_listed || "clean"}</span></div>
                </div>
                <div class="detail-section">
                    <h3>Domain Intel</h3>
                    <div class="detail-row"><span class="key">Registered</span><span class="val">${email.domain_registered || "unknown"}</span></div>
                    <div class="detail-row"><span class="key">Age</span><span class="val">${email.domain_age_days ?? "—"} days</span></div>
                    <div class="detail-row"><span class="key">URLhaus</span><span class="val">${email.urlhaus_status || "—"}</span></div>
                    <div class="detail-row"><span class="key">ThreatFox</span><span class="val">${email.threatfox_status || "—"}</span></div>
                    <div class="detail-row"><span class="key">Pulsedive</span><span class="val">${email.pulsedive_risk || "—"}</span></div>
                </div>
            </div>

            <div class="detail-section" style="margin-bottom:16px">
                <h3>AI Analysis</h3>
                <div class="detail-row"><span class="key">LLM Verdict</span><span class="val">${email.llm_verdict || "—"}</span></div>
                <div class="detail-row"><span class="key">Confidence</span><span class="val">${email.llm_confidence || "—"}</span></div>
                <div class="detail-row"><span class="key">LLM Score</span><span class="val">${email.llm_risk_score ?? "—"}/100</span></div>
                <div class="detail-row"><span class="key">Reason</span><span class="val">${email.llm_reason || "—"}</span></div>
            </div>

            ${
              reasons.length
                ? `
            <div class="reasons-box">
                <h3>Risk Reasons</h3>
                ${reasons.map((r) => `<div class="reason-item">${r}</div>`).join("")}
            </div>`
                : ""
            }
        `;

        document.getElementById("modal").classList.add("active");
      }

      // ── Close modal ───────────────────────────────────────────
      function closeModal() {
        document.getElementById("modal").classList.remove("active");
      }

      // Close modal when clicking outside
      document.getElementById("modal").addEventListener("click", function (e) {
        if (e.target === this) closeModal();
      });

      // ── Initialize ────────────────────────────────────────────
      loadStats();
      loadEmails();

      // Update timestamp
      document.getElementById("last-updated").textContent =
        "Atria Solutions — Last updated: " + new Date().toLocaleString();
    </script>
  </body>
</html>
